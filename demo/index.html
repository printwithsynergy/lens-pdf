<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoupePDF · smoke demo</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
      header { padding: 12px 16px; border-bottom: 1px solid #1e293b; background: #020617; }
      h1 { margin: 0 0 4px 0; font-size: 16px; }
      header p { margin: 0; color: #94a3b8; font-size: 12px; }
      main { display: grid; grid-template-columns: 280px 1fr 280px; min-height: calc(100vh - 60px); }
      aside { padding: 12px; border-right: 1px solid #1e293b; background: #0b1220; overflow-y: auto; }
      aside.right { border-right: none; border-left: 1px solid #1e293b; }
      aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin: 16px 0 8px; }
      aside h2:first-child { margin-top: 0; }
      .stage { padding: 16px; overflow: auto; background: #1e293b; }
      .modes { display: flex; flex-direction: column; gap: 4px; }
      .modes button { text-align: left; padding: 8px 10px; border-radius: 6px; border: 1px solid #1e293b; background: #0f172a; color: #cbd5e1; cursor: pointer; }
      .modes button.active { border-color: #3b82f6; color: #fff; background: #1d4ed8; }
      label.row { display: flex; align-items: center; gap: 6px; margin: 4px 0; color: #cbd5e1; }
      input[type="text"] { width: 100%; padding: 6px 8px; border-radius: 4px; border: 1px solid #334155; background: #020617; color: #e2e8f0; font: inherit; }
      .hint { font-size: 11px; color: #64748b; margin-top: 6px; }
      .destructive { color: #f87171; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
