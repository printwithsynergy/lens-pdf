<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>loupe render parity harness</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }
      #frame {
        width: 1224px;
        height: 1584px;
        overflow: hidden;
      }
      #viewport {
        width: 1224px;
        height: 1584px;
      }
    </style>
  </head>
  <body>
    <div id="frame">
      <canvas id="viewport" width="1224" height="1584"></canvas>
    </div>
    <script type="importmap">
      {
        "imports": {
          "pdfjs-dist": "/node_modules/pdfjs-dist/build/pdf.mjs"
        }
      }
    </script>
    <script type="module">
      import { createPdfJsFallback } from "/dist/fallback-pdfjs/index.js";

      const params = new URLSearchParams(window.location.search);
      const pdfUrl = params.get("pdf");
      const pageNum = Number(params.get("page") ?? "1");
      const dpi = Number(params.get("dpi") ?? "144");

      if (!pdfUrl) {
        throw new Error("Missing required parity param `pdf`.");
      }

      const fallback = createPdfJsFallback({
        pdfUrl,
      });

      const pageMeta = await fallback.getPageDimensions(pageNum);
      const canvas = document.getElementById("viewport");
      canvas.width = Math.round((pageMeta.widthPts * dpi) / 72);
      canvas.height = Math.round((pageMeta.heightPts * dpi) / 72);

      const imageUrl = await fallback.renderPageToUrl({ pageNum, dpi });
      const image = new Image();
      image.src = imageUrl;
      await image.decode();
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("2D context unavailable.");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      window.__renderParityReady = true;
    </script>
  </body>
</html>
