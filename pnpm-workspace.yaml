packages: []

overrides:
  vite: ">=8.0.5"
  ws: ">=8.20.1"
  # Pin three transitive deps to their latest releases that are >24h old so the
  # npm publish workflow's pnpm v11 supply-chain minimumReleaseAge guard passes.
  # The just-published patches (semver 7.8.2, undici 7.27.1, obug 2.1.2) are
  # legitimate but too fresh; these aged predecessors are functionally equivalent.
  semver: "7.8.1"
  undici: "7.27.0"
  obug: "2.1.1"

# pnpm v11 (used by the npm publish workflow) errors on un-approved dependency
# build scripts. canvas is a native devDependency (jsdom canvas support) that
# ships prebuilt binaries; approve its build so the publish install succeeds.
allowBuilds:
  canvas: true

# The publish workflow's pnpm v11 minimumReleaseAge guard rejects fresh
# releases. Biome's per-platform CLI binaries are version-locked to the
# @biomejs/biome devDependency, so a Biome bump is blocked for 24h after
# every release. It's dev tooling from a trusted publisher and never ships
# in the published artifact — exempt the scope from the age gate.
minimumReleaseAgeExclude:
  - "@biomejs/*"
