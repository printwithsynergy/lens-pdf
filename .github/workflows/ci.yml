name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --passWithNoTests || pnpm test
        # Vitest exits 1 if no test files match; the package was extracted
        # without tests on its own (tests live in lint-pdf:packages/viewer-shared/tests/
        # — moving them here is Phase 4 cleanup work).

      - name: Build
        run: pnpm build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          ls -lh dist/ | head
