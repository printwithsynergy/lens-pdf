name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install semgrep
        run: pip install semgrep==1.165.0

      - name: Semgrep scan
        run: >-
          semgrep scan --error
          --config p/security-audit
          --config p/secrets
          --config p/javascript
          --config p/typescript
          adapters browser components fallback-pdfjs host plugin types units scripts server index.ts
