name: Publish lens-server to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "lens-server-v*.*.*"
      - "lens-server-v*.*.*-*"
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: Publish @printwithsynergy/lens-server
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # On main pushes, publish only when server/package.json moved past npm —
      # makes merge-triggered runs idempotent (and no-ops for unrelated merges).
      - name: Check whether this version is already on npm
        id: guard
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "@printwithsynergy/lens-server@$LOCAL" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$LOCAL already on npm — skipping publish"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        if: steps.guard.outputs.publish == 'true'
        run: npm install --no-audit --no-fund

      - name: Lint
        if: steps.guard.outputs.publish == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.guard.outputs.publish == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.guard.outputs.publish == 'true'
        run: npm test

      - name: Build
        if: steps.guard.outputs.publish == 'true'
        run: npm run build

      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
