name: publish-npm

# Publishes @printwithsynergy/lens-pdf to npm when a v*.*.* tag is pushed.
#
# Auth: NPM_TOKEN secret (classic token with "publish" permission).
# Set it once at GitHub repo settings → Secrets → NPM_TOKEN.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@printwithsynergy/lens-pdf
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
