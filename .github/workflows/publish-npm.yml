name: publish-npm

# Publishes @printwithsynergy/lens-pdf to npm when a v*.*.* tag is pushed.
#
# Auth: NPM_TOKEN secret (classic token with "publish" permission).
# Set it once at GitHub repo settings → Secrets → NPM_TOKEN.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@printwithsynergy/lens-pdf
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
