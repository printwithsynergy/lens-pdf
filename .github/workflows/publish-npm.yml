name: publish-npm

# Publishes @printwithsynergy/lens-pdf to npm when a v*.*.* tag is pushed.
#
# Auth: NPM_TOKEN secret (classic token with "publish" permission).
# Set it once at GitHub repo settings → Secrets → NPM_TOKEN.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@printwithsynergy/lens-pdf
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # On main pushes, publish only when package.json moved past npm —
      # makes merge-triggered runs idempotent (and no-ops for unrelated merges).
      - name: Check whether this version is already on npm
        id: guard
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "@printwithsynergy/lens-pdf@$LOCAL" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$LOCAL" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$LOCAL already on npm — skipping publish"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.guard.outputs.publish == 'true'
        run: pnpm run build

      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
