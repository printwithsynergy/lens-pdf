name: Bug report
description: Report a defect in LoupePDF
title: "bug: <short summary>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please fill in as much detail as you can — it
        speeds up triage considerably. For security issues, please use the
        process in [SECURITY.md](../SECURITY.md) instead of this template.

  - type: input
    id: version
    attributes:
      label: LoupePDF version
      description: Output of `npm ls @printwithsynergy/loupe-pdf` or the git ref.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React + react-dom version
      placeholder: "19.0.0"
    validations:
      required: true

  - type: dropdown
    id: env
    attributes:
      label: Environment
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Node / SSR
        - Other (mention in repro)
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug. Include console errors verbatim if relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        A code snippet, sandbox link, or repo we can clone. The smaller, the
        faster we'll get to it. If the bug only shows up in your specific
        host wiring, please at least share the relevant `ViewerServices` /
        `ViewerHostContext` values.
      render: tsx
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I'm running on the latest released version (or `main`) and the issue still reproduces.
          required: true
